name: Release Build & Package

# Builds .deb, .pkg.tar.zst (pacman), and AppImage on tag push.
# Auto-uploads all artifacts to GitHub Releases.
# Triggers on: new tags matching v* (e.g., v0.1.3, v0.1.3-rc1)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., v0.1.3)'
        required: true
        type: string

jobs:
  # ============================================================
  # Build .deb package (Debian/Ubuntu)
  # ============================================================
  build-deb:
    name: Build .deb (Ubuntu 24.04)
    runs-on: ubuntu-24.04
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake ninja-build debhelper \
            qtbase5-dev qtdeclarative5-dev qtmultimedia5-dev \
            libqt5svg5-dev qtquickcontrols2-5-dev \
            libavcodec-dev libavformat-dev libavutil-dev libswscale-dev libswresample-dev \
            libfreetype6-dev libfontconfig1-dev libpng-dev libharfbuzz-dev \
            libglib2.0-dev libzstd-dev libjson-c-dev \
            zlib1g-dev \
            libgl1-mesa-dev libegl1-mesa-dev libglvnd-dev \
            libexpat1-dev libwebp-dev \
            libjpeg62-turbo-dev libxi-dev libxkbcommon-dev \
            libmypaint-dev

      - name: Restore Skia build cache
        id: cache-skia-restore
        uses: actions/cache/restore@v4
        with:
          path: third_party/skia/out/Release
          key: ${{ runner.os }}-release-skia-m100-v5

      - name: Build vendored Skia (if not cached)
        if: steps.cache-skia-restore.outputs.cache-hit != 'true'
        run: |
          cd third_party
          rm -rf skia
          git clone https://chromium.googlesource.com/skia skia
          cd skia
          git checkout 9ea0f5911f804a73806ad3ae935769ba9f42f30d
          sed -i 's/subprocess.check_output(\([^)]*\))/subprocess.check_output(\1, text=True)/g' gn/is_clang.py
          sed -i "s/b'clang'/'clang'/g" gn/is_clang.py
          sed -i 's|#!/usr/bin/env python|#!/usr/bin/env python3|' gn/is_clang.py
          sed -i 's/itervalues()/values()/g' tools/git-sync-deps
          sed -i 's|#!/usr/bin/env python|#!/usr/bin/env python3|' tools/git-sync-deps
          export PATH="/usr/bin:$PATH"
          python3 tools/git-sync-deps || true
          find third_party/externals/icu/scripts -name '*.py' -exec sed -i 's/print "\(.*\)"/print("\1")/g' {} \;
          find third_party/externals -name '*.py' -path '*/scripts/*' -exec sed -i 's/print "\(.*\)"/print("\1")/g' {} \;
          python3 -c "
          import pathlib
          p = pathlib.Path('third_party/externals/icu/scripts/make_data_assembly.py')
          t = p.read_text()
          t = t.replace('.hexlify(input_data[i:i + 4][::step]).upper()', '.hexlify(input_data[i:i + 4][::step]).decode(\"ascii\").upper()')
          p.write_text(t)
          "
          bin/gn gen out/Release --args='is_official_build=true is_debug=false skia_use_vulkan=false skia_use_gl=true skia_use_system_expat=false skia_use_system_icu=true skia_use_system_libjpeg_turbo=false skia_use_system_libpng=false skia_use_system_libwebp=false skia_use_system_zlib=false'
          ninja -C out/Release skia
          cd ..

      - name: Save Skia build cache
        if: steps.cache-skia-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: third_party/skia/out/Release
          key: ${{ runner.os }}-release-skia-m100-v5

      - name: Build .deb package
        run: |
          VERSION=$(git describe --tags --always | sed 's/^v//')
          # Update debian changelog with current version
          dch --distribution unstable --newversion "${VERSION}-1" "Automated build"
          dpkg-buildpackage -us -uc -b
          ls -la ../enve_*.deb

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: enve-deb
          if-no-files-found: error
          path: ../enve_*.deb

  # ============================================================
  # Build pacman package (Arch Linux)
  # ============================================================
  build-pacman:
    name: Build pacman package (Arch Linux)
    runs-on: ubuntu-latest
    container: archlinux:latest
    timeout-minutes: 180

    steps:
      - name: Install git (container requirement)
        run: pacman -Sy --noconfirm git

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          pacman -Syu --noconfirm \
            base-devel cmake ninja \
            qt5-base qt5-declarative qt5-multimedia \
            qt5-svg qt5-quickcontrols2 \
            ffmpeg freetype2 fontconfig libpng harfbuzz \
            glib2 libmypaint zstd libglvnd libwebp libjpeg-turbo \
            libxi libxkbcommon expat json-c

      - name: Restore Skia build cache
        id: cache-skia-restore
        uses: actions/cache/restore@v4
        with:
          path: third_party/skia/out/Release
          key: Linux-release-skia-m100-v5

      - name: Build vendored Skia (if not cached)
        if: steps.cache-skia-restore.outputs.cache-hit != 'true'
        run: |
          cd third_party
          rm -rf skia
          git clone https://chromium.googlesource.com/skia skia
          cd skia
          git checkout 9ea0f5911f804a73806ad3ae935769ba9f42f30d
          sed -i 's/subprocess.check_output(\([^)]*\))/subprocess.check_output(\1, text=True)/g' gn/is_clang.py
          sed -i "s/b'clang'/'clang'/g" gn/is_clang.py
          sed -i 's|#!/usr/bin/env python|#!/usr/bin/env python3|' gn/is_clang.py
          sed -i 's/itervalues()/values()/g' tools/git-sync-deps
          sed -i 's|#!/usr/bin/env python|#!/usr/bin/env python3|' tools/git-sync-deps
          export PATH="/usr/bin:$PATH"
          python3 tools/git-sync-deps || true
          find third_party/externals/icu/scripts -name '*.py' -exec sed -i 's/print "\(.*\)"/print("\1")/g' {} \;
          find third_party/externals -name '*.py' -path '*/scripts/*' -exec sed -i 's/print "\(.*\)"/print("\1")/g' {} \;
          python3 -c "
          import pathlib
          p = pathlib.Path('third_party/externals/icu/scripts/make_data_assembly.py')
          t = p.read_text()
          t = t.replace('.hexlify(input_data[i:i + 4][::step]).upper()', '.hexlify(input_data[i:i + 4][::step]).decode(\"ascii\").upper()')
          p.write_text(t)
          "
          bin/gn gen out/Release --args='is_official_build=true is_debug=false skia_use_vulkan=false skia_use_gl=true skia_use_system_expat=false skia_use_system_icu=true skia_use_system_libjpeg_turbo=false skia_use_system_libpng=false skia_use_system_libwebp=false skia_use_system_zlib=false'
          ninja -C out/Release skia
          cd ..

      - name: Save Skia build cache
        if: steps.cache-skia-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: third_party/skia/out/Release
          key: Linux-release-skia-m100-v5

      - name: Build pacman package
        run: |
          VERSION=$(git describe --tags --always | sed 's/^v//')
          # Update PKGBUILD version
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" PKGBUILD
          # Build package
          makepkg -s --noconfirm
          ls -la enve-*.pkg.tar.zst

      - name: Upload pacman artifact
        uses: actions/upload-artifact@v4
        with:
          name: enve-pacman
          if-no-files-found: error
          path: enve-*.pkg.tar.zst

  # ============================================================
  # Build AppImage (Ubuntu 22.04 for maximum compatibility)
  # ============================================================
  build-appimage:
    name: Build AppImage (Ubuntu 22.04)
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake ninja-build \
            qtbase5-dev qtdeclarative5-dev qtmultimedia5-dev \
            libqt5svg5-dev qtquickcontrols2-5-dev \
            libavcodec-dev libavformat-dev libavutil-dev libswscale-dev libswresample-dev \
            libfreetype6-dev libfontconfig1-dev libpng-dev libharfbuzz-dev \
            libglib2.0-dev libzstd-dev libjson-c-dev \
            zlib1g-dev \
            libgl1-mesa-dev libegl1-mesa-dev libglvnd-dev \
            libexpat1-dev libwebp-dev \
            libjpeg-turbo8-dev libxi-dev libxkbcommon-dev \
            libmypaint-dev \
            libfuse2 desktop-file-utils

      - name: Restore Skia build cache
        id: cache-skia-restore
        uses: actions/cache/restore@v4
        with:
          path: third_party/skia/out/Release
          key: ${{ runner.os }}-release-skia-m100-v5

      - name: Build vendored Skia (if not cached)
        if: steps.cache-skia-restore.outputs.cache-hit != 'true'
        run: |
          cd third_party
          rm -rf skia
          git clone https://chromium.googlesource.com/skia skia
          cd skia
          git checkout 9ea0f5911f804a73806ad3ae935769ba9f42f30d
          sed -i 's/subprocess.check_output(\([^)]*\))/subprocess.check_output(\1, text=True)/g' gn/is_clang.py
          sed -i "s/b'clang'/'clang'/g" gn/is_clang.py
          sed -i 's|#!/usr/bin/env python|#!/usr/bin/env python3|' gn/is_clang.py
          sed -i 's/itervalues()/values()/g' tools/git-sync-deps
          sed -i 's|#!/usr/bin/env python|#!/usr/bin/env python3|' tools/git-sync-deps
          export PATH="/usr/bin:$PATH"
          python3 tools/git-sync-deps || true
          find third_party/externals/icu/scripts -name '*.py' -exec sed -i 's/print "\(.*\)"/print("\1")/g' {} \;
          find third_party/externals -name '*.py' -path '*/scripts/*' -exec sed -i 's/print "\(.*\)"/print("\1")/g' {} \;
          python3 -c "
          import pathlib
          p = pathlib.Path('third_party/externals/icu/scripts/make_data_assembly.py')
          t = p.read_text()
          t = t.replace('.hexlify(input_data[i:i + 4][::step]).upper()', '.hexlify(input_data[i:i + 4][::step]).decode(\"ascii\").upper()')
          p.write_text(t)
          "
          bin/gn gen out/Release --args='is_official_build=true is_debug=false skia_use_vulkan=false skia_use_gl=true skia_use_system_expat=false skia_use_system_icu=true skia_use_system_libjpeg_turbo=false skia_use_system_libpng=false skia_use_system_libwebp=false skia_use_system_zlib=false'
          ninja -C out/Release skia
          cd ..

      - name: Save Skia build cache
        if: steps.cache-skia-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: third_party/skia/out/Release
          key: ${{ runner.os }}-release-skia-m100-v5

      - name: Build enve
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DENVE_USE_SYSTEM_LIBMYPAINT=ON \
            -DENVE_USE_WEBENGINE=OFF \
            -DENVE_USE_QSCINTILLA=OFF \
            -DENVE_USE_GPERFTOOLS=OFF
          cmake --build build -j"$(nproc)"

      - name: Create AppDir
        run: |
          VERSION=$(git describe --tags --always | sed 's/^v//')
          APPDIR=AppDir
          mkdir -p "${APPDIR}/usr/bin"
          mkdir -p "${APPDIR}/usr/share/applications"
          mkdir -p "${APPDIR}/usr/share/icons/hicolor/scalable/apps"
          mkdir -p "${APPDIR}/usr/lib"

          # Copy binary
          cp build/bin/enve "${APPDIR}/usr/bin/enve"

          # Copy desktop file
          cp org.maurycy.enve.desktop "${APPDIR}/usr/share/applications/org.maurycy.enve.desktop"

          # Copy icon
          cp pixmaps/enve.svg "${APPDIR}/usr/share/icons/hicolor/scalable/apps/enve.svg"

          # Copy shared libraries that aren't in base system
          # Qt5 libs
          cp /usr/lib/x86_64-linux-gnu/libQt5Core.so.5* "${APPDIR}/usr/lib/" 2>/dev/null || true
          cp /usr/lib/x86_64-linux-gnu/libQt5Gui.so.5* "${APPDIR}/usr/lib/" 2>/dev/null || true
          cp /usr/lib/x86_64-linux-gnu/libQt5Widgets.so.5* "${APPDIR}/usr/lib/" 2>/dev/null || true
          cp /usr/lib/x86_64-linux-gnu/libQt5Svg.so.5* "${APPDIR}/usr/lib/" 2>/dev/null || true
          cp /usr/lib/x86_64-linux-gnu/libQt5Multimedia.so.5* "${APPDIR}/usr/lib/" 2>/dev/null || true
          cp /usr/lib/x86_64-linux-gnu/libQt5Network.so.5* "${APPDIR}/usr/lib/" 2>/dev/null || true
          cp /usr/lib/x86_64-linux-gnu/libQt5OpenGL.so.5* "${APPDIR}/usr/lib/" 2>/dev/null || true
          cp /usr/lib/x86_64-linux-gnu/libQt5Sql.so.5* "${APPDIR}/usr/lib/" 2>/dev/null || true
          cp /usr/lib/x86_64-linux-gnu/libQt5Qml.so.5* "${APPDIR}/usr/lib/" 2>/dev/null || true
          cp /usr/lib/x86_64-linux-gnu/libQt5QmlModels.so.5* "${APPDIR}/usr/lib/" 2>/dev/null || true
          cp /usr/lib/x86_64-linux-gnu/libQt5Quick.so.5* "${APPDIR}/usr/lib/" 2>/dev/null || true
          cp /usr/lib/x86_64-linux-gnu/libQt5Xml.so.5* "${APPDIR}/usr/lib/" 2>/dev/null || true
          cp /usr/lib/x86_64-linux-gnu/libQt5Concurrent.so.5* "${APPDIR}/usr/lib/" 2>/dev/null || true

          # FFmpeg libs
          cp /usr/lib/x86_64-linux-gnu/libavcodec.so.* "${APPDIR}/usr/lib/" 2>/dev/null || true
          cp /usr/lib/x86_64-linux-gnu/libavformat.so.* "${APPDIR}/usr/lib/" 2>/dev/null || true
          cp /usr/lib/x86_64-linux-gnu/libavutil.so.* "${APPDIR}/usr/lib/" 2>/dev/null || true
          cp /usr/lib/x86_64-linux-gnu/libswscale.so.* "${APPDIR}/usr/lib/" 2>/dev/null || true
          cp /usr/lib/x86_64-linux-gnu/libswresample.so.* "${APPDIR}/usr/lib/" 2>/dev/null || true

          # Other runtime deps
          cp /usr/lib/x86_64-linux-gnu/libmypaint-1.5.so.* "${APPDIR}/usr/lib/" 2>/dev/null || true
          cp /usr/lib/x86_64-linux-gnu/libjson-c.so.* "${APPDIR}/usr/lib/" 2>/dev/null || true
          cp /usr/lib/x86_64-linux-gnu/libglib-2.0.so.* "${APPDIR}/usr/lib/" 2>/dev/null || true
          cp /usr/lib/x86_64-linux-gnu/libfreetype.so.* "${APPDIR}/usr/lib/" 2>/dev/null || true
          cp /usr/lib/x86_64-linux-gnu/libfontconfig.so.* "${APPDIR}/usr/lib/" 2>/dev/null || true
          cp /usr/lib/x86_64-linux-gnu/libharfbuzz.so.* "${APPDIR}/usr/lib/" 2>/dev/null || true
          cp /usr/lib/x86_64-linux-gnu/libpng16.so.* "${APPDIR}/usr/lib/" 2>/dev/null || true
          cp /usr/lib/x86_64-linux-gnu/libwebp.so.* "${APPDIR}/usr/lib/" 2>/dev/null || true
          cp /usr/lib/x86_64-linux-gnu/libwebpmux.so.* "${APPDIR}/usr/lib/" 2>/dev/null || true
          cp /usr/lib/x86_64-linux-gnu/libwebpdemux.so.* "${APPDIR}/usr/lib/" 2>/dev/null || true
          cp /usr/lib/x86_64-linux-gnu/libjpeg.so.* "${APPDIR}/usr/lib/" 2>/dev/null || true
          cp /usr/lib/x86_64-linux-gnu/libzstd.so.* "${APPDIR}/usr/lib/" 2>/dev/null || true
          cp /usr/lib/x86_64-linux-gnu/libexpat.so.* "${APPDIR}/usr/lib/" 2>/dev/null || true

          # Create AppRun
          cat > "${APPDIR}/AppRun" << 'APPRUN'
          #!/bin/bash
          SELF=$(readlink -f "$0")
          HERE=${SELF%/*}
          export LD_LIBRARY_PATH="${HERE}/usr/lib:${LD_LIBRARY_PATH}"
          export QT_QPA_PLATFORM_PLUGIN_PATH="${HERE}/usr/plugins/platforms"
          export QML2_IMPORT_PATH="${HERE}/usr/qml"
          exec "${HERE}/usr/bin/enve" "$@"
          APPRUN
          chmod +x "${APPDIR}/AppRun"

          # Create .DirIcon
          cp "${APPDIR}/usr/share/icons/hicolor/scalable/apps/enve.svg" "${APPDIR}/.DirIcon"

          echo "AppDir created at ${APPDIR}"
          find "${APPDIR}" -type f | head -50

      - name: Build AppImage with linuxdeploy
        run: |
          VERSION=$(git describe --tags --always | sed 's/^v//')
          # Download linuxdeploy
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage

          # Download Qt plugin
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy-plugin-qt-x86_64.AppImage

          # Build AppImage
          OUTPUT=enve-${VERSION}-x86_64.AppImage
          ./linuxdeploy-x86_64.AppImage --appdir AppDir \
            --plugin qt \
            --output appimage \
            --desktop-file AppDir/usr/share/applications/org.maurycy.enve.desktop \
            --icon-file AppDir/usr/share/icons/hicolor/scalable/apps/enve.svg \
            --executable AppDir/usr/bin/enve \
            --appimage-extract-and-run 2>/dev/null || \
          ./linuxdeploy-x86_64.AppImage --appdir AppDir \
            --plugin qt \
            --output appimage \
            --desktop-file AppDir/usr/share/applications/org.maurycy.enve.desktop \
            --icon-file AppDir/usr/share/icons/hicolor/scalable/apps/enve.svg \
            --executable AppDir/usr/bin/enve

          # Rename output
          mv enve-*.AppImage "${OUTPUT}" 2>/dev/null || \
          mv Enve-*.AppImage "${OUTPUT}" 2>/dev/null || \
          ls -la *.AppImage

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: enve-appimage
          if-no-files-found: warn
          path: "*.AppImage"

  # ============================================================
  # Upload all artifacts to GitHub Release
  # ============================================================
  upload-release:
    name: Upload to GitHub Release
    needs: [build-deb, build-pacman, build-appimage]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: enve ${{ steps.version.outputs.VERSION }}
          prerelease: ${{ contains(steps.version.outputs.VERSION, 'rc') || contains(steps.version.outputs.VERSION, 'alpha') || contains(steps.version.outputs.VERSION, 'beta') }}
          generate_release_notes: true
          files: |
            artifacts/enve-deb/*.deb
            artifacts/enve-pacman/*.pkg.tar.zst
            artifacts/enve-appimage/*.AppImage

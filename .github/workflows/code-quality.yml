name: Code Quality Check

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    # Run weekly on Monday at 00:00 UTC
    - cron: '0 0 * * 1'

jobs:
  quality:
    name: Code Quality Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install fuck-u-code
        run: npm install -g eff-u-code

      - name: Run code quality analysis
        run: |
          echo "=== Code Quality Report ==="
          fuck-u-code analyze src --top 10 --format markdown --locale en > quality-report.md
          cat quality-report.md

      - name: Upload quality report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: code-quality-report
          path: quality-report.md
          retention-days: 30

      - name: Check for regression
        run: |
          # Extract overall score
          SCORE=$(fuck-u-code analyze src --format json 2>/dev/null | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          print(data.get('overall_score', 0))
          " 2>/dev/null || echo "0")

          # Baseline: enve historically scores around 94-95
          # Alert if score drops below 90 (significant regression)
          THRESHOLD=90
          if [ "$(echo "$SCORE < $THRESHOLD" | bc)" -eq 1 ]; then
            echo "::warning::Code quality score ($SCORE) dropped below threshold ($THRESHOLD)"
            echo "QUALITY_REGRESSION=true" >> $GITHUB_ENV
          else
            echo "Code quality score ($SCORE) is acceptable (threshold: $THRESHOLD)"
          fi

      - name: Comment on PR if quality regressed
        if: env.QUALITY_REGRESSION == 'true' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '⚠️ **Code Quality Alert**: The overall code quality score dropped below the threshold. Please review the top problematic files in the quality report artifact.'
            })

name: Multi-Distro Build

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main
    paths:
      - ".github/workflows/multi-distro.yml"
      - "CMakeLists.txt"
      - "src/**"
  schedule:
    - cron: '0 3 * * 1'

jobs:
  build:
    name: ${{ matrix.distro.name }}
    runs-on: ${{ matrix.distro.runner }}
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        distro:
          - name: "Arch Linux"
            runner: ubuntu-latest
            container: archlinux:latest
            install: |
              pacman -Syu --noconfirm \
                base-devel cmake ninja qt5-base qt5-declarative qt5-multimedia \
                qt5-svg qt5-quickcontrols2 \
                ffmpeg libmypaint freetype2 fontconfig libpng harfbuzz \
                libjpeg-turbo libwebp libglvnd libxi libxkbcommon zlib expat \
                json-c glib2
            qmake: "qmake"
          - name: "Ubuntu 26.04"
            runner: ubuntu-latest
            install: |
              sudo apt-get update
              sudo apt-get install -y \
                build-essential cmake ninja-build \
                qtbase5-dev qtdeclarative5-dev qtmultimedia5-dev \
                libqt5svg5-dev qtquickcontrols2-5-dev \
                libavcodec-dev libavformat-dev libavutil-dev libswscale-dev libswresample-dev \
                libfreetype6-dev libfontconfig1-dev libpng-dev libharfbuzz-dev \
                libglib2.0-dev libzstd-dev libjson-c-dev \
                zlib1g-dev \
                libgl1-mesa-dev libegl1-mesa-dev libglvnd-dev \
                libexpat1-dev libwebp-dev \
                libjpeg-turbo8-dev libxi-dev libxkbcommon-dev \
                libmypaint-dev
          - name: "Ubuntu 24.04"
            runner: ubuntu-24.04
            install: |
              sudo apt-get update
              sudo apt-get install -y \
                build-essential cmake ninja-build \
                qtbase5-dev qtdeclarative5-dev qtmultimedia5-dev \
                libqt5svg5-dev qtquickcontrols2-5-dev \
                libavcodec-dev libavformat-dev libavutil-dev libswscale-dev libswresample-dev \
                libfreetype6-dev libfontconfig1-dev libpng-dev libharfbuzz-dev \
                libglib2.0-dev libzstd-dev libjson-c-dev \
                zlib1g-dev \
                libgl1-mesa-dev libegl1-mesa-dev libglvnd-dev \
                libexpat1-dev libwebp-dev \
                libjpeg-turbo8-dev libxi-dev libxkbcommon-dev \
                libmypaint-dev
          - name: "Ubuntu 22.04"
            runner: ubuntu-22.04
            install: |
              sudo apt-get update
              sudo apt-get install -y \
                build-essential cmake ninja-build \
                qtbase5-dev qtdeclarative5-dev qtmultimedia5-dev \
                libqt5svg5-dev qtquickcontrols2-5-dev \
                libavcodec-dev libavformat-dev libavutil-dev libswscale-dev libswresample-dev \
                libfreetype6-dev libfontconfig1-dev libpng-dev libharfbuzz-dev \
                libglib2.0-dev libzstd-dev libjson-c-dev \
                zlib1g-dev \
                libgl1-mesa-dev libegl1-mesa-dev libglvnd-dev \
                libexpat1-dev libwebp-dev \
                libjpeg-turbo8-dev libxi-dev libxkbcommon-dev \
                libmypaint-dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        if: matrix.distro.install != '' && matrix.distro.container == ''
        run: ${{ matrix.distro.install }}

      - name: Install dependencies (Arch container)
        if: matrix.distro.container != ''
        run: |
          ${{ matrix.distro.install }}

      - name: Build vendored quazip
        if: matrix.distro.name != 'Arch Linux'
        run: |
          cd third_party/quazip
          qmake quazip.pro CONFIG+=release
          make -j"$(nproc)"
          cd ../..

      - name: Build vendored quazip (Arch)
        if: matrix.distro.name == 'Arch Linux'
        run: |
          cd third_party/quazip
          ${{ matrix.distro.qmake }} quazip.pro CONFIG+=release
          make -j"$(nproc)"
          cd ../..

      - name: Restore Skia build cache
        id: cache-skia-restore
        uses: actions/cache/restore@v4
        with:
          path: third_party/skia/out/Release
          key: ${{ runner.os }}-cmake-app-skia-m100-v4

      - name: Build vendored Skia (if not cached)
        if: steps.cache-skia-restore.outputs.cache-hit != 'true'
        run: |
          cd third_party
          rm -rf skia
          git clone https://chromium.googlesource.com/skia skia
          cd skia
          git checkout 9ea0f5911f804a73806ad3ae935769ba9f42f30d
          sed -i 's/subprocess.check_output(\([^)]*\))/subprocess.check_output(\1, text=True)/g' gn/is_clang.py
          sed -i "s/b'clang'/'clang'/g" gn/is_clang.py
          sed -i 's|#!/usr/bin/env python|#!/usr/bin/env python3|' gn/is_clang.py
          sed -i 's/itervalues()/values()/g' tools/git-sync-deps
          sed -i 's|#!/usr/bin/env python|#!/usr/bin/env python3|' tools/git-sync-deps
          export PATH="/usr/bin:$PATH"
          python3 tools/git-sync-deps || true
          find third_party/externals/icu/scripts -name '*.py' -exec sed -i 's/print "\(.*\)"/print("\1")/g' {} \;
          find third_party/externals -name '*.py' -path '*/scripts/*' -exec sed -i 's/print "\(.*\)"/print("\1")/g' {} \;
          python3 -c "
          import pathlib
          p = pathlib.Path('third_party/externals/icu/scripts/make_data_assembly.py')
          t = p.read_text()
          t = t.replace('.hexlify(input_data[i:i + 4][::step]).upper()', '.hexlify(input_data[i:i + 4][::step]).decode(\"ascii\").upper()')
          p.write_text(t)
          "
          bin/gn gen out/Release --args='is_official_build=true is_debug=false skia_use_vulkan=false skia_use_gl=true skia_use_system_expat=false skia_use_system_icu=true skia_use_system_libjpeg_turbo=false skia_use_system_libpng=false skia_use_system_libwebp=false skia_use_system_zlib=false'
          ninja -C out/Release skia
          cd ..

      - name: Save Skia build cache
        if: steps.cache-skia-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: third_party/skia/out/Release
          key: ${{ runner.os }}-cmake-app-skia-m100-v4

      - name: Detect FFmpeg version
        run: |
          echo "FFmpeg version info:"
          pkg-config --modversion libavcodec libavformat libavutil 2>/dev/null || echo "pkg-config not available"
          ffmpeg -version 2>/dev/null | head -1 || echo "ffmpeg CLI not available"

      - name: Configure CMake
        run: |
          cmake -S . -B build/cmake \
            -DENVE_USE_SYSTEM_LIBMYPAINT=ON \
            -DENVE_USE_WEBENGINE=OFF \
            -DENVE_USE_QSCINTILLA=OFF \
            -DENVE_USE_GPERFTOOLS=OFF \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build envecore
        run: cmake --build build/cmake --target envecore -j"$(nproc)" 2>&1 | tee /tmp/build-envecore.log || { cat /tmp/build-envecore.log; exit 1; }

      - name: Build enve app
        run: cmake --build build/cmake --target enve -j"$(nproc)" 2>&1 | tee /tmp/build-enve.log || { cat /tmp/build-enve.log; exit 1; }

      - name: Upload enve binary
        uses: actions/upload-artifact@v4
        with:
          name: enve-${{ matrix.distro.name }}
          if-no-files-found: warn
          path: |
            build/cmake/bin/enve
            build/cmake/bin/
            bin/enve

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ matrix.distro.name }}
          if-no-files-found: warn
          path: |
            /tmp/build-envecore.log
            /tmp/build-enve.log

name: CMake App (Arch / FFmpeg 7.x)

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths-ignore:
      - '.ai/**'
      - '.omx/**'
      - '**.md'

env:
  DEBIAN_FRONTEND: noninteractive

jobs:
  build:
    runs-on: ubuntu-24.04
    name: CMake App (Arch-like / FFmpeg 7.x)

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Make CI scripts executable
        run: |
          chmod +x .github/workflows/scripts/*.sh 2>/dev/null || true

      - name: Install build dependencies (FFmpeg 7.x + Skia)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake ninja-build autoconf automake libtool intltool \
            qtbase5-dev qtdeclarative5-dev qtmultimedia5-dev \
            libqt5svg5-dev qtquickcontrols2-5-dev \
            libavcodec-dev libavformat-dev libavutil-dev libswscale-dev libswresample-dev \
            libfreetype6-dev libfontconfig1-dev libpng-dev libharfbuzz-dev \
            libglib2.0-dev libzstd-dev libjson-c-dev \
            zlib1g-dev \
            libgl1-mesa-dev libegl1-mesa-dev libglvnd-dev \
            libexpat1-dev libwebp-dev \
            libjpeg-turbo8-dev libxi-dev libxkbcommon-dev
          # Verify FFmpeg 7.x
          pkg-config --modversion libavcodec libavutil

      - name: Build vendored quazip
        run: |
          cd third_party/quazip
          qmake quazip.pro CONFIG+=release
          make -j"$(nproc)"
          ls -la quazip/*.so*
          cd ../..

      - name: Restore Skia build cache
        id: cache-skia-restore
        uses: actions/cache/restore@v4
        with:
          path: |
            third_party/skia/out/Release
          key: ${{ runner.os }}-cmake-app-skia-m100-v4

      - name: Build vendored Skia (if not cached)
        if: steps.cache-skia-restore.outputs.cache-hit != 'true'
        run: |
          cd third_party
          rm -rf skia skia-build
          # Skia m100 build script
          python3 tools/git-sync-deps
          gn gen out/Release --args='
            is_official_build=true
            is_debug=false
            skia_use_system_libjpeg_turbo=false
            skia_use_system_libwebp=false
            skia_use_system_libpng=false
            skia_use_system_harfbuzz=false
            skia_use_system_freetype2=false
            skia_use_system_expat=false
            skia_use_system_icu=false
            skia_use_system_zlib=false
            skia_use_gl=true
            skia_enable_pdf=true
            skia_enable_skottie=true
            skia_enable_skshaper=true
            skia_use_fontconfig=true
            extra_cflags=["-DSK_GL"]
          '
          ninja -C out/Release
          cd ..

      - name: Save Skia build cache
        uses: actions/cache/save@v4
        with:
          path: |
            third_party/skia/out/Release
          key: ${{ runner.os }}-cmake-app-skia-m100-v4

      - name: Configure CMake
        run: |
          cmake -S . -B build/cmake \
            -DENVE_USE_SYSTEM_LIBMYPAINT=OFF \
            -DENVE_USE_WEBENGINE=OFF \
            -DENVE_USE_QSCINTILLA=OFF \
            -DENVE_USE_GPERFTOOLS=OFF \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build envecore
        run: |
          cmake --build build/cmake --target envecore -j"$(nproc)"

      - name: Build enve app
        run: |
          cmake --build build/cmake --target enve -j"$(nproc)"

      - name: Check binary
        run: |
          file build/cmake/bin/enve
          ldd build/cmake/bin/enve | grep "not found" || echo "All libraries found"

      - name: Upload enve binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: enve-cmake-app-arch
          path: |
            build/cmake/bin/enve
          if-no-files-found: error

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cmake-app-build-logs
          path: |
            build/cmake/CMakeFiles/CMakeOutput.log
            build/cmake/CMakeFiles/CMakeError.log
          if-no-files-found: warn

name: Render Smoke Test

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main
    paths:
      - "src/**"
      - "third_party/skia/**"

jobs:
  render-test:
    name: Render Smoke Test (Ubuntu 24.04)
    runs-on: ubuntu-24.04
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake ninja-build \
            qtbase5-dev qtdeclarative5-dev qtmultimedia5-dev \
            libqt5svg5-dev qtquickcontrols2-5-dev \
            libavcodec-dev libavformat-dev libavutil-dev libswscale-dev libswresample-dev \
            libfreetype6-dev libfontconfig1-dev libpng-dev libharfbuzz-dev \
            libglib2.0-dev libzstd-dev libjson-c-dev \
            zlib1g-dev \
            libgl1-mesa-dev libegl1-mesa-dev libglvnd-dev \
            libexpat1-dev libwebp-dev \
            libjpeg-turbo8-dev libxi-dev libxkbcommon-dev \
            libmypaint-dev \
            xvfb

      - name: Build vendored quazip
        run: |
          cd third_party/quazip
          qmake quazip.pro CONFIG+=release
          make -j"$(nproc)"
          cd ../..

      - name: Restore Skia build cache
        id: cache-skia-restore
        uses: actions/cache/restore@v4
        with:
          path: third_party/skia/out/Release
          key: ${{ runner.os }}-cmake-app-skia-m100-v4

      - name: Build vendored Skia (if not cached)
        if: steps.cache-skia-restore.outputs.cache-hit != 'true'
        run: |
          cd third_party
          rm -rf skia
          git clone https://chromium.googlesource.com/skia skia
          cd skia
          git checkout 9ea0f5911f804a73806ad3ae935769ba9f42f30d
          sed -i 's/subprocess.check_output(\([^)]*\))/subprocess.check_output(\1, text=True)/g' gn/is_clang.py
          sed -i "s/b'clang'/'clang'/g" gn/is_clang.py
          sed -i 's|#!/usr/bin/env python|#!/usr/bin/env python3|' gn/is_clang.py
          sed -i 's/itervalues()/values()/g' tools/git-sync-deps
          sed -i 's|#!/usr/bin/env python|#!/usr/bin/env python3|' tools/git-sync-deps
          export PATH="/usr/bin:$PATH"
          python3 tools/git-sync-deps || true
          find third_party/externals/icu/scripts -name '*.py' -exec sed -i 's/print "\(.*\)"/print("\1")/g' {} \;
          find third_party/externals -name '*.py' -path '*/scripts/*' -exec sed -i 's/print "\(.*\)"/print("\1")/g' {} \;
          python3 -c "
          import pathlib
          p = pathlib.Path('third_party/externals/icu/scripts/make_data_assembly.py')
          t = p.read_text()
          t = t.replace('.hexlify(input_data[i:i + 4][::step]).upper()', '.hexlify(input_data[i:i + 4][::step]).decode(\"ascii\").upper()')
          p.write_text(t)
          "
          bin/gn gen out/Release --args='is_official_build=true is_debug=false skia_use_vulkan=false skia_use_gl=true skia_use_system_expat=false skia_use_system_icu=true skia_use_system_libjpeg_turbo=false skia_use_system_libpng=false skia_use_system_libwebp=false skia_use_system_zlib=false'
          ninja -C out/Release skia
          cd ..

      - name: Save Skia build cache
        if: steps.cache-skia-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: third_party/skia/out/Release
          key: ${{ runner.os }}-cmake-app-skia-m100-v4

      - name: Configure CMake (Release)
        run: |
          cmake -S . -B build/release \
            -DENVE_USE_SYSTEM_LIBMYPAINT=ON \
            -DENVE_USE_WEBENGINE=OFF \
            -DENVE_USE_QSCINTILLA=OFF \
            -DENVE_USE_GPERFTOOLS=OFF \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build envecore
        run: cmake --build build/release --target envecore -j"$(nproc)"

      - name: Build enve app
        run: cmake --build build/release --target enve -j"$(nproc)"

      - name: Run headless rendering smoke test
        run: |
          # Test 1: Binary launches with Xvfb (OpenGL context creation)
          xvfb-run -a --server-args="-screen 0 1024x768x24" timeout 10 ./build/release/bin/enve --help 2>&1 || true
          echo "Test 1 PASSED: Binary launch with Xvfb"

          # Test 2: Build and run Skia rendering test program
          cat > /tmp/skia_render_test.cpp << 'EOF'
          #include <stdio.h>
          #include "include/core/SkBitmap.h"
          #include "include/core/SkCanvas.h"
          #include "include/core/SkImage.h"
          #include "include/core/SkData.h"
          #include "include/core/SkStream.h"
          #include "include/encode/SkPngEncoder.h"

          int main() {
              // Test 1: Create bitmap and draw
              SkBitmap bitmap;
              bitmap.allocN32Pixels(256, 256);
              SkCanvas canvas(bitmap);
              canvas.clear(SK_ColorWHITE);

              // Draw a red rectangle
              SkPaint paint;
              paint.setColor(SK_ColorRED);
              canvas.drawRect(SkRect::MakeXYWH(10, 10, 100, 100), paint);

              // Draw a blue circle
              paint.setColor(SK_ColorBLUE);
              canvas.drawCircle(180, 180, 50, paint);

              // Encode to PNG
              SkDynamicMemoryWStream stream;
              SkPngEncoder::Options opts;
              auto data = SkPngEncoder::Encode(&stream, bitmap.pixmap(), opts);
              if (!data) {
                  fprintf(stderr, "FAILED: PNG encoding failed\n");
                  return 1;
              }

              // Write to file
              SkFILEWStream out("/tmp/render_test_output.png");
              out.write(data->data(), data->size());
              out.flush();

              printf("Test 2 PASSED: Skia rendering and PNG encoding OK\n");
              printf("Output: /tmp/render_test_output.png (%zu bytes)\n", data->size());
              return 0;
          }
          EOF

          # Compile and run the Skia rendering test
          g++ -std=c++17 -I third_party/skia -I third_party/skia/include \
              /tmp/skia_render_test.cpp \
              -o /tmp/skia_render_test \
              third_party/skia/out/Release/libskia.a \
              -lpthread -ldl -lfontconfig -lfreetype -lGL -lpng -lz -ljpeg -lwebp -lwebpdemux -lwebpmux -lexpat -lharfbuzz -lglib-2.0 -licuuc -licui18n

          /tmp/skia_render_test

          # Verify output file exists and has reasonable size
          if [ -f /tmp/render_test_output.png ]; then
              SIZE=$(stat -c%s /tmp/render_test_output.png)
              if [ "$SIZE" -gt 1000 ]; then
                  echo "Test 3 PASSED: Output file exists and is $SIZE bytes (valid PNG)"
              else
                  echo "Test 3 FAILED: Output file too small ($SIZE bytes)"
                  exit 1
              fi
          else
              echo "Test 3 FAILED: Output file not created"
              exit 1
          fi

      - name: Upload render test output
        uses: actions/upload-artifact@v4
        with:
          name: render-test-output
          if-no-files-found: error
          path: /tmp/render_test_output.png

      - name: Upload enve binary
        uses: actions/upload-artifact@v4
        with:
          name: enve-render-test
          if-no-files-found: error
          path: build/release/bin/enve

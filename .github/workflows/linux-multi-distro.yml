  # Arch Linux build - using proven CMake App Build pattern
  archlinux:
    name: Arch Linux
    runs-on: ubuntu-22.04
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Make CI scripts executable
        run: chmod +x scripts/ci/*.sh
      - name: Install build dependencies
        run: |
          sudo pacman -Syu --noconfirm \
            base-devel cmake git \
            qt5-base qt5-declarative qt5-multimedia \
            qt5-svg qt5-quickcontrols2 \
            ffmpeg freetype2 fontconfig libpng harfbuzz \
            glib2 libmypaint zstd \
            libglvnd libwebp libjpeg-turbo \
            libxi libxkbcommon
      - name: Build vendored libmypaint
        run: |
          cd third_party/libmypaint
          ./autogen.sh
          ./configure --disable-static --enable-shared
          make -j"$(nproc)"
          cd ../..
      - name: Build vendored quazip
        run: |
          cd third_party/quazip
          qmake quazip.pro CONFIG+=release
          make -j"$(nproc)"
          cd ../..
      - name: Build enve with CMake
        run: |
          cmake -S . -B build/cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DENVE_USE_SYSTEM_LIBMYPAINT=ON \
            -DENVE_USE_WEBENGINE=OFF \
            -DENVE_USE_QSCINTILLA=OFF \
            -DENVE_USE_GPERFTOOLS=OFF
          cmake --build build/cmake -j"$(nproc)"
      - name: Create Arch package
        run: |
          mkdir -p arch-package/usr/bin
          mkdir -p arch-package/usr/share/applications
          mkdir -p arch-package/usr/share/icons/hicolor/scalable/apps
          cp build/cmake/bin/enve arch-package/usr/bin/
          cp org.maurycy.enve.desktop arch-package/usr/share/applications/
          cp pixmaps/enve.svg arch-package/usr/share/icons/hicolor/scalable/apps/
          cd arch-package
          find . -type f | sed 's|^\./||' > ../FILES.txt
          cd ..
          tar -czf enve-archlinux.tar.gz -C arch-package .
      - uses: actions/upload-artifact@v4
        with:
          name: enve-archlinux
          path: enve-archlinux.tar.gz

  # AppImage build - using proven CMake App Build pattern
  appimage:
    name: AppImage (Universal Linux)
    runs-on: ubuntu-22.04
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Make CI scripts executable

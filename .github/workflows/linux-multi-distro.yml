name: Multi-Distro Build (Phase 5 Packaging)

# Phase 5: Build-System Migration - Packaging Infrastructure
# Focused builds: Arch Linux and Ubuntu 24.04 LTS only
# Other distributions and architectures are queued but not built

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main
    paths:
      - ".github/workflows/linux-multi-distro.yml"
      - "debian/**"
      - "PKGBUILD"
      - "AppImageBuilder.yml"

jobs:
  # Primary builds - Arch Linux and Ubuntu 24.04 LTS
  ubuntu-2404:
    name: Ubuntu 24.04 LTS (Noble)
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Make CI scripts executable
        run: chmod +x scripts/ci/*.sh
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake ninja-build autoconf automake libtool intltool \
            qtbase5-dev qtdeclarative5-dev qtmultimedia5-dev \
            libqt5svg5-dev qtquickcontrols2-5-dev \
            libavcodec-dev libavformat-dev libavutil-dev \
            libswscale-dev libswresample-dev \
            libfreetype6-dev libfontconfig1-dev libpng-dev \
            libharfbuzz-dev libglib2.0-dev libmypaint-dev \
            libzstd-dev zlib1g-dev \
            libgl1-mesa-dev libegl1-mesa-dev libglvnd-dev \
            libexpat1-dev libwebp-dev libwebpmux-dev libwebpdemux-dev \
            libjpeg-turbo8-dev libxi-dev libxkbcommon-dev
      - name: Build vendored libmypaint
        run: |
          cd third_party/libmypaint
          ./autogen.sh
          ./configure --disable-static --enable-shared
          make -j"$(nproc)"
          cd ../..
      - name: Build vendored quazip
        run: |
          cd third_party/quazip
          qmake quazip.pro CONFIG+=release
          make -j"$(nproc)"
          cd ../..
      - name: Build enve with CMake
        run: |
          cmake -S . -B build/cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DENVE_USE_SYSTEM_LIBMYPAINT=ON \
            -DENVE_USE_WEBENGINE=OFF \
            -DENVE_USE_QSCINTILLA=OFF \
            -DENVE_USE_GPERFTOOLS=OFF
          cmake --build build/cmake -j"$(nproc)"
      - name: Create package archive
        run: |
          mkdir -p package/usr/bin
          mkdir -p package/usr/share/applications
          mkdir -p package/usr/share/icons/hicolor/scalable/apps
          cp build/cmake/bin/enve package/usr/bin/
          cp org.maurycy.enve.desktop package/usr/share/applications/
          cp pixmaps/enve.svg package/usr/share/icons/hicolor/scalable/apps/
          cd package
          find . -type f | sed 's|^\./||' > ../FILES.txt
          cd ..
          tar -czf enve-ubuntu-24.04.tar.gz -C package .
      - uses: actions/upload-artifact@v4
        with:
          name: enve-ubuntu-24.04
          path: enve-ubuntu-24.04.tar.gz

  archlinux:
    name: Arch Linux
    runs-on: ubuntu-22.04
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Make CI scripts executable
        run: chmod +x scripts/ci/*.sh
      - name: Install build dependencies
        run: |
          sudo pacman -Syu --noconfirm \
            base-devel cmake git \
            qt5-base qt5-declarative qt5-multimedia \
            qt5-svg qt5-quickcontrols2 \
            ffmpeg freetype2 fontconfig libpng harfbuzz \
            glib2 libmypaint zstd \
            libglvnd libwebp libjpeg-turbo \
            libxi libxkbcommon
      - name: Build vendored libmypaint
        run: |
          cd third_party/libmypaint
          ./autogen.sh
          ./configure --disable-static --enable-shared
          make -j"$(nproc)"
          cd ../..
      - name: Build vendored quazip
        run: |
          cd third_party/quazip
          qmake quazip.pro CONFIG+=release
          make -j"$(nproc)"
          cd ../..
      - name: Build enve with CMake
        run: |
          cmake -S . -B build/cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DENVE_USE_SYSTEM_LIBMYPAINT=ON \
            -DENVE_USE_WEBENGINE=OFF \
            -DENVE_USE_QSCINTILLA=OFF \
            -DENVE_USE_GPERFTOOLS=OFF
          cmake --build build/cmake -j"$(nproc)"
      - name: Create package archive
        run: |
          mkdir -p package/usr/bin
          mkdir -p package/usr/share/applications
          mkdir -p package/usr/share/icons/hicolor/scalable/apps
          cp build/cmake/bin/enve package/usr/bin/
          cp org.maurycy.enve.desktop package/usr/share/applications/
          cp pixmaps/enve.svg package/usr/share/icons/hicolor/scalable/apps/
          cd package
          find . -type f | sed 's|^\./||' > ../FILES.txt
          cd ..
          tar -czf enve-archlinux.tar.gz -C package .
      - uses: actions/upload-artifact@v4
        with:
          name: enve-archlinux
          path: enve-archlinux.tar.gz


name: Multi-Distro Build (Phase 5 Packaging)

# Phase 5: Build-System Migration - Packaging Infrastructure
# Parallel builds for multiple Linux distributions

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main
    paths:
      - ".github/workflows/linux-multi-distro.yml"
      - "debian/**"
      - "PKGBUILD"
      - "AppImageBuilder.yml"

jobs:
  # Ubuntu LTS builds
  ubuntu-2004:
    name: Ubuntu 20.04 LTS (Focal)
    runs-on: ubuntu-20.04
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Build with dpkg-buildpackage
        run: |
          sudo apt-get update
          sudo apt-get build-dep -y .
          sudo apt-get install -y dpkg-dev debhelper
          dpkg-buildpackage -us -uc -b
      - uses: actions/upload-artifact@v4
        with:
          name: enve-ubuntu-20.04
          path: ../enve_*.deb

  ubuntu-2204:
    name: Ubuntu 22.04 LTS (Jammy)
    runs-on: ubuntu-22.04
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Build with dpkg-buildpackage
        run: |
          sudo apt-get update
          sudo apt-get build-dep -y .
          sudo apt-get install -y dpkg-dev debhelper
          dpkg-buildpackage -us -uc -b
      - uses: actions/upload-artifact@v4
        with:
          name: enve-ubuntu-22.04
          path: ../enve_*.deb

  ubuntu-2404:
    name: Ubuntu 24.04 LTS (Noble)
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Build with dpkg-buildpackage
        run: |
          sudo apt-get update
          sudo apt-get build-dep -y .
          sudo apt-get install -y dpkg-dev debhelper
          dpkg-buildpackage -us -uc -b
      - uses: actions/upload-artifact@v4
        with:
          name: enve-ubuntu-24.04
          path: ../enve_*.deb

  # Debian builds
  debian-11:
    name: Debian 11 (Bullseye)
    runs-on: ubuntu-22.04
    timeout-minutes: 180
    container: debian:11
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y sudo
          apt-get build-dep -y .
          apt-get install -y dpkg-dev debhelper
      - name: Build with dpkg-buildpackage
        run: dpkg-buildpackage -us -uc -b
      - uses: actions/upload-artifact@v4
        with:
          name: enve-debian-11
          path: /enve_*.deb

  debian-12:
    name: Debian 12 (Bookworm)
    runs-on: ubuntu-22.04
    timeout-minutes: 180
    container: debian:12
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y sudo
          apt-get build-dep -y .
          apt-get install -y dpkg-dev debhelper
      - name: Build with dpkg-buildpackage
        run: dpkg-buildpackage -us -uc -b
      - uses: actions/upload-artifact@v4
        with:
          name: enve-debian-12
          path: /enve_*.deb

  # Arch Linux build
  archlinux:
    name: Arch Linux
    runs-on: ubuntu-22.04
    timeout-minutes: 180
    container: archlinux:latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install build dependencies
        run: |
          pacman -Syu --noconfirm base-devel git cmake qt5-base qt5-tools
      - name: Build with makepkg
        run: |
          makepkg -s --noconfirm
      - uses: actions/upload-artifact@v4
        with:
          name: enve-archlinux
          path: /enve-*.pkg.tar.zst

  # AppImage build
  appimage:
    name: AppImage (Universal Linux)
    runs-on: ubuntu-22.04
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake ninja-build \
            qtbase5-dev qtdeclarative5-dev qtmultimedia5-dev \
            libqt5svg5-dev qtquickcontrols2-5-dev \
            libavcodec-dev libavformat-dev libavutil-dev \
            libswscale-dev libswresample-dev \
            libfreetype6-dev libfontconfig1-dev libpng-dev \
            libharfbuzz-dev libglib2.0-dev libmypaint-dev \
            libzstd-dev zlib1g-dev \
            libgl1-mesa-dev libegl1-mesa-dev libglvnd-dev \
            libexpat1-dev libwebp-dev libjpeg-turbo8-dev \
            libxi-dev libxkbcommon-dev \
            desktop-file-utils appstream util-linux \
            fuse libfuse2
      - name: Build enve with CMake
        run: |
          cmake -S . -B build/cmake -DCMAKE_BUILD_TYPE=Release
          cmake --build build/cmake -j"$(nproc)"
      - name: Create AppImage
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage
          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --executable build/cmake/bin/enve \
            --desktop-file org.maurycy.enve.desktop \
            --icon-file pixmaps/enve.svg \
            --output appimage
      - uses: actions/upload-artifact@v4
        with:
          name: enve-appimage
          path: Enve-*.AppImage

  # ARM64 builds (using emulation)
  ubuntu-2404-arm64:
    name: Ubuntu 24.04 ARM64
    runs-on: ubuntu-22.04
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Build in ARM64 container
        run: |
          docker run --rm --platform linux/arm64 -v ${{ github.workspace }}:/work ubuntu:24.04 bash -c "
            cd /work &&
            apt-get update &&
            apt-get build-dep -y . &&
            apt-get install -y dpkg-dev debhelper &&
            dpkg-buildpackage -us -uc -b -aarm64
          "
      - uses: actions/upload-artifact@v4
        with:
          name: enve-ubuntu-24.04-arm64
          path: ../enve_*_arm64.deb

  # RISC-V experimental (if feasible)
  riscv64-experimental:
    name: RISC-V 64 (Experimental)
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Build in RISC-V container (experimental)
        run: |
          docker run --rm --platform linux/riscv64 -v ${{ github.workspace }}:/work debian:unstable bash -c "
            cd /work &&
            apt-get update &&
            apt-get build-dep -y . || true &&
            apt-get install -y dpkg-dev debhelper &&
            dpkg-buildpackage -us -uc -b -ariscv64 || true
          "
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: enve-riscv64-experimental
          path: ../enve_*_riscv64.deb

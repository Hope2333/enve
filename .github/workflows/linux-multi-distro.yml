name: Multi-Distro Build (Phase 5 Packaging)

# Phase 5: Build-System Migration - Packaging Infrastructure
# Parallel builds for multiple Linux distributions
# Based on proven CMake App Build (Phase 5) workflow

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main
    paths:
      - ".github/workflows/linux-multi-distro.yml"
      - "debian/**"
      - "PKGBUILD"
      - "AppImageBuilder.yml"

jobs:
  # Ubuntu LTS builds - using proven CMake App Build pattern
  ubuntu-2204:
    name: Ubuntu 22.04 LTS (Jammy)
    runs-on: ubuntu-22.04
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Make CI scripts executable
        run: chmod +x scripts/ci/*.sh
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake ninja-build autoconf automake libtool intltool \
            qtbase5-dev qtdeclarative5-dev qtmultimedia5-dev \
            libqt5svg5-dev qtquickcontrols2-5-dev \
            libavcodec-dev libavformat-dev libavutil-dev \
            libswscale-dev libswresample-dev \
            libfreetype6-dev libfontconfig1-dev libpng-dev \
            libharfbuzz-dev libglib2.0-dev libmypaint-dev \
            libzstd-dev zlib1g-dev \
            libgl1-mesa-dev libegl1-mesa-dev libglvnd-dev \
            libexpat1-dev libwebp-dev libwebpmux-dev libwebpdemux-dev \
            libjpeg-turbo8-dev libxi-dev libxkbcommon-dev \
            dpkg-dev debhelper desktop-file-utils
      - name: Build vendored libmypaint
        run: |
          cd third_party/libmypaint
          ./autogen.sh
          ./configure --disable-static --enable-shared
          make -j"$(nproc)"
          cd ../..
      - name: Build vendored quazip
        run: |
          cd third_party/quazip
          qmake quazip.pro CONFIG+=release
          make -j"$(nproc)"
          cd ../..
      - name: Build enve with CMake
        run: |
          cmake -S . -B build/cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DENVE_USE_SYSTEM_LIBMYPAINT=ON \
            -DENVE_USE_WEBENGINE=OFF \
            -DENVE_USE_QSCINTILLA=OFF \
            -DENVE_USE_GPERFTOOLS=OFF
          cmake --build build/cmake -j"$(nproc)"
      - name: Create Debian package
        run: |
          mkdir -p debian-package/usr/bin
          mkdir -p debian-package/usr/share/applications
          mkdir -p debian-package/usr/share/icons/hicolor/scalable/apps
          cp build/cmake/bin/enve debian-package/usr/bin/
          cp org.maurycy.enve.desktop debian-package/usr/share/applications/
          cp pixmaps/enve.svg debian-package/usr/share/icons/hicolor/scalable/apps/
          cd debian-package
          find . -type f | sed 's|^\./||' > ../FILES.txt
          cd ..
          tar -czf enve-ubuntu-22.04.tar.gz -C debian-package .
      - uses: actions/upload-artifact@v4
        with:
          name: enve-ubuntu-22.04
          path: enve-ubuntu-22.04.tar.gz


name: Multi-Distro Build

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/linux-multi-distro.yml"
      - "Makefile"
      - "scripts/ci/**"
      - "*.pro"
      - "src/**/*.pro"
  push:
    branches:
      - master
      - main
    paths:
      - ".github/workflows/linux-multi-distro.yml"
      - "Makefile"
      - "scripts/ci/**"
      - "*.pro"
      - "src/**/*.pro"

env:
  PROXY: http://localhost:7890
  JOBS: 2
  COMPRESS: 6
  VER: 0.0.0

jobs:
  build-ubuntu:
    name: Ubuntu 22.04 (Qt 5.15)
    runs-on: ubuntu-22.04
    timeout-minutes: 240

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            qt5-qmake qtbase5-dev qtbase5-dev-tools \
            qtmultimedia5-dev libqt5svg5-dev \
            libqt5webchannel5-dev \
            libavcodec-dev libavformat-dev libavutil-dev \
            libswscale-dev libswresample-dev \
            libmypaint-dev libgoogle-perftools-dev libunwind-dev \
            libjson-c-dev libfontconfig1-dev \
            libfreetype6-dev libpng-dev \
            curl patch make g++ wget libfuse2

      - name: Cache third-party builds
        id: cache-third-party
        uses: actions/cache@v4
        with:
          path: |
            build/Release/stamps/third_party
            third_party/skia/out/Release
            third_party/libmypaint/.libs
            third_party/libmypaint/libmypaint
            third_party/quazip/quazip
            third_party/gperftools/.libs
            third_party/qscintilla/Qt4Qt5
          key: ${{ runner.os }}-third-party-${{ hashFiles('third_party/Makefile', 'third_party/**/Makefile') }}
          restore-keys: |
            ${{ runner.os }}-third-party-

      - name: Build with Makefile (default)
        run: |
          make build VER=${{ env.VER }} JOBS=${{ env.JOBS }}

      - name: Build with minimal dependencies
        run: |
          make clean
          make build VER=${{ env.VER }} JOBS=${{ env.JOBS }} \
            ENVE_USE_GPERFTOOLS=0 \
            ENVE_USE_WEBENGINE=0 \
            ENVE_USE_QSCINTILLA=0 \
            ENVE_USE_OPENMP=0

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: enve-ubuntu-22.04
          path: |
            build/Release/src/app/enve
            build/Release/src/core/libenvecore.so*

  build-debian:
    name: Debian 12 (Bookworm)
    runs-on: ubuntu-22.04
    container: debian:bookworm
    timeout-minutes: 240

    steps:
      - name: Install git in container
        run: |
          apt-get update && apt-get install -y git

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y \
            qt5-qmake qtbase5-dev qtbase5-dev-tools \
            qtmultimedia5-dev libqt5svg5-dev \
            libqt5webchannel5-dev \
            libavcodec-dev libavformat-dev libavutil-dev \
            libswscale-dev libswresample-dev \
            libmypaint-dev libgoogle-perftools-dev \
            libjson-c-dev libfontconfig1-dev \
            libfreetype6-dev libpng-dev \
            curl patch make g++ wget

      - name: Cache third-party builds
        id: cache-third-party
        uses: actions/cache@v4
        with:
          path: |
            build/Release/stamps/third_party
            third_party/skia/out/Release
            third_party/libmypaint/.libs
            third_party/libmypaint/libmypaint
            third_party/quazip/quazip
            third_party/gperftools/.libs
            third_party/qscintilla/Qt4Qt5
          key: Debian-12-third-party-${{ hashFiles('third_party/Makefile', 'third_party/**/Makefile') }}
          restore-keys: |
            Debian-12-third-party-

      - name: Build with Makefile
        run: |
          make build VER=${{ env.VER }} JOBS=${{ env.JOBS }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: enve-debian-12
          path: |
            build/Release/src/app/enve
            build/Release/src/core/libenvecore.so*

  build-arch:
    name: Arch Linux (Latest Qt)
    runs-on: ubuntu-22.04
    container: archlinux:latest
    timeout-minutes: 240

    steps:
      - name: Install git in container
        run: |
          pacman -Sy --noconfirm git

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm \
            qt5-base qt5-multimedia qt5-svg qt5-declarative \
            ffmpeg libmypaint gperftools \
            json-c fontconfig freetype2 libpng \
            curl patch make gcc git wget

      - name: Cache third-party builds
        id: cache-third-party
        uses: actions/cache@v4
        with:
          path: |
            build/Release/stamps/third_party
            third_party/skia/out/Release
            third_party/libmypaint/.libs
            third_party/libmypaint/libmypaint
            third_party/quazip/quazip
            third_party/gperftools/.libs
            third_party/qscintilla/Qt4Qt5
          key: Arch-Linux-third-party-${{ hashFiles('third_party/Makefile', 'third_party/**/Makefile') }}
          restore-keys: |
            Arch-Linux-third-party-

      - name: Build with Makefile
        run: |
          make build VER=${{ env.VER }} JOBS=${{ env.JOBS }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: enve-archlinux
          path: |
            build/Release/src/app/enve
            build/Release/src/core/libenvecore.so*

  package-deb:
    name: Debian Package
    needs: [build-debian]
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    if: false  # Packaging follow-up lane, not a Phase 2 blocker

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            qt5-qmake qtbase5-dev qtbase5-dev-tools \
            qtmultimedia5-dev libqt5svg5-dev \
            libqt5webchannel5-dev \
            libavcodec-dev libavformat-dev libavutil-dev \
            libswscale-dev libswresample-dev \
            libmypaint-dev libgoogle-perftools-dev libunwind-dev \
            libjson-c-dev libfontconfig1-dev \
            libfreetype6-dev libpng-dev \
            curl patch make g++ wget

      - name: Build and package with Makefile
        run: |
          make all VER=${{ env.VER }} PKG=deb JOBS=${{ env.JOBS }} COMPRESS=${{ env.COMPRESS }} \
            ENVE_USE_SYSTEM_LIBMYPAINT=1

      - name: Upload .deb package
        uses: actions/upload-artifact@v4
        with:
          name: enve_0.0.0_amd64.deb
          path: packing/deb/enve_*.deb

  package-pkg:
    name: Arch Package
    needs: [build-arch]
    runs-on: ubuntu-22.04
    container: archlinux:latest
    timeout-minutes: 60
    if: false  # Packaging follow-up lane, not a Phase 2 blocker

    steps:
      - name: Install git in container
        run: |
          pacman -Sy --noconfirm git

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm \
            qt5-base qt5-multimedia qt5-svg qt5-declarative \
            ffmpeg libmypaint gperftools \
            json-c fontconfig freetype2 libpng \
            curl patch make gcc git wget

      - name: Build and package with Makefile
        run: |
          make all VER=${{ env.VER }} PKG=pkg JOBS=${{ env.JOBS }} COMPRESS=${{ env.COMPRESS }} \
            ENVE_USE_SYSTEM_LIBMYPAINT=1

      - name: Upload Arch package
        uses: actions/upload-artifact@v4
        with:
          name: enve-archlinux.pkg.tar.gz
          path: packing/pacman/enve-*.pkg.tar.gz

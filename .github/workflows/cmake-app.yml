name: CMake App Build (Phase 5)

# Phase 5: Build-System Migration - Batch B.2.2
# Narrow validation path for minimal app-side CMake slice.
# This workflow validates that the enve application target can be built with CMake.

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main
    paths:
      - ".github/workflows/cmake-app.yml"
      - "CMakeLists.txt"
      - "src/app/CMakeLists.txt"
      - "src/app/**"
      - "src/core/CMakeLists.txt"
      - "src/core/**"

jobs:
  cmake-app:
    name: CMake App (Ubuntu 24.04 / FFmpeg 6.x)
    runs-on: ubuntu-24.04
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Make CI scripts executable
        run: chmod +x scripts/ci/*.sh

      - name: Install Linux build dependencies (FFmpeg 6.x + Skia)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake ninja-build autoconf automake libtool intltool \
            qtbase5-dev qtdeclarative5-dev qtmultimedia5-dev \
            libqt5svg5-dev qtquickcontrols2-5-dev \
            libavcodec-dev libavformat-dev libavutil-dev libswscale-dev libswresample-dev \
            libfreetype6-dev libfontconfig1-dev libpng-dev libharfbuzz-dev \
            libglib2.0-dev libmypaint-dev libzstd-dev \
            zlib1g-dev \
            libgl1-mesa-dev libegl1-mesa-dev libglvnd-dev \
            libexpat1-dev libwebp-dev \
            libjpeg-turbo8-dev libxi-dev libxkbcommon-dev
          # Verify FFmpeg 6.x
          pkg-config --modversion libavcodec libavutil

      - name: Build vendored libmypaint
        run: |
          cd third_party/libmypaint
          ./autogen.sh
          ./configure --disable-static --enable-shared
          make -j4
          ls -la mypaint-config.h
          cd ../..

      - name: Build vendored quazip
        run: |
          cd third_party/quazip
          qmake quazip.pro CONFIG+=release
          make -j4
          ls -la quazip/*.so*
          cd ../..

      - name: Cache third-party builds
        id: cache-third-party
        uses: actions/cache@v4
        with:
          path: |
            third_party/skia/out/Release
          key: ${{ runner.os }}-cmake-app-third-party-${{ hashFiles('third_party/skia/DEPS') }}
          restore-keys: |
            ${{ runner.os }}-cmake-app-third-party-

      - name: Build vendored Skia (if not cached)
        if: steps.cache-third-party.outputs.cache-hit != 'true'
        run: |
          cd third_party
          # Remove old attempts
          rm -rf skia skia-build
          # Use pinned 2020 Skia version with Python 3 bridge
          # This version is known to work with enve codebase
          git clone --depth 1 --branch 76f4fff613b5ba4365d24dbd943a8ed47221f1e9 https://chromium.googlesource.com/skia skia
          cd skia
          # Python 3 bridge for git-sync-deps
          # The script uses 'print' statements that need Python 3 syntax
          sed -i 's/print "([^"]*)"/print("\1")/g' tools/git-sync-deps 2>/dev/null || true
          # Use python3 explicitly
          export PATH="/usr/bin:$PATH"
          python3 tools/git-sync-deps || python tools/git-sync-deps || true
          # Generate build files
          bin/gn gen out/Release --args='is_official_build=true is_debug=false skia_use_vulkan=false skia_use_gl=true extra_cflags_cc=["-USK_HIDE_PATH_EDIT_METHODS"]'
          ninja -C out/Release skia
          # Verify
          ls -la out/Release/libskia.a
          cd ..

      - name: Configure CMake
        run: |
          cmake -S . -B build/cmake \
            -DENVE_USE_SYSTEM_LIBMYPAINT=1 \
            -DENVE_USE_WEBENGINE=OFF \
            -DENVE_USE_QSCINTILLA=OFF \
            -DENVE_USE_GPERFTOOLS=OFF \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build envecore
        run: |
          cmake --build build/cmake --target envecore -j4

      - name: Build enve app
        run: |
          cmake --build build/cmake --target enve -j4

      - name: Upload enve artifact
        uses: actions/upload-artifact@v4
        with:
          name: enve-cmake-app
          if-no-files-found: warn
          path: build/cmake/bin/enve

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cmake-app-build-logs
          if-no-files-found: warn
          path: |
            build/cmake/CMakeFiles/CMakeOutput.log
            build/cmake/CMakeFiles/CMakeError.log

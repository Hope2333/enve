name: CMake App Build (Phase 5)

# Phase 5: Build-System Migration - Batch B.2.2
# Narrow validation path for minimal app-side CMake slice.
# This workflow validates that the enve application target can be built with CMake.

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main
    paths:
      - ".github/workflows/cmake-app.yml"
      - "CMakeLists.txt"
      - "src/app/CMakeLists.txt"
      - "src/app/**"
      - "src/core/CMakeLists.txt"
      - "src/core/**"

jobs:
  cmake-app:
    name: CMake App (Ubuntu 24.04 / FFmpeg 6.x)
    runs-on: ubuntu-24.04
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Make CI scripts executable
        run: chmod +x scripts/ci/*.sh

      - name: Install Linux build dependencies (FFmpeg 6.x + Skia)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake ninja-build autoconf automake libtool intltool \
            qtbase5-dev qtdeclarative5-dev qtmultimedia5-dev \
            libqt5svg5-dev qtquickcontrols2-5-dev \
            libavcodec-dev libavformat-dev libavutil-dev libswscale-dev libswresample-dev \
            libfreetype6-dev libfontconfig1-dev libpng-dev libharfbuzz-dev \
            libglib2.0-dev libzstd-dev libjson-c-dev \
            zlib1g-dev \
            libgl1-mesa-dev libegl1-mesa-dev libglvnd-dev \
            libexpat1-dev libwebp-dev \
            libjpeg-turbo8-dev libxi-dev libxkbcommon-dev \
            libmypaint-dev
          # Verify FFmpeg 6.x
          pkg-config --modversion libavcodec libavutil

      - name: Build vendored quazip
        run: |
          cd third_party/quazip
          qmake quazip.pro CONFIG+=release
          make -j4
          ls -la quazip/*.so*
          cd ../..

      - name: Cache Skia build
        id: cache-skia
        uses: actions/cache@v4
        with:
          path: |
            third_party/skia/out/Release
          key: ${{ runner.os }}-cmake-app-skia-m88-${{ hashFiles('third_party/skia/DEPS') }}
          restore-keys: |
            ${{ runner.os }}-cmake-app-skia-m88-

      - name: Build vendored Skia (if not cached)
        if: steps.cache-skia.outputs.cache-hit != 'true'
        run: |
          cd third_party
          # Remove old attempts
          rm -rf skia skia-build
          # Use Skia m88 (2021-02) with Python 3 compatibility
          git clone https://chromium.googlesource.com/skia skia
          cd skia
          git checkout 158dc9d7d4cafb177b99b68c5dc502f8f4282092

          # Phase 6.C: Python 3 compatibility fixes
          sed -i 's/subprocess.check_output(\([^)]*\))/subprocess.check_output(\1, text=True)/g' gn/is_clang.py
          sed -i "s/b'clang'/'clang'/g" gn/is_clang.py
          sed -i 's|#!/usr/bin/env python|#!/usr/bin/env python3|' gn/is_clang.py
          sed -i 's/itervalues()/values()/g' tools/git-sync-deps
          sed -i 's|#!/usr/bin/env python|#!/usr/bin/env python3|' tools/git-sync-deps

          export PATH="/usr/bin:$PATH"
          python3 tools/git-sync-deps || true

          # Fix Python 2 print statements in ICU and other scripts (must run AFTER git-sync-deps)
          # Convert: print "..." → print("...")
          # Convert: print "..." + var → print("..." + var)
          find third_party/externals/icu/scripts -name '*.py' -exec sed -i 's/print "\(.*\)"/print("\1")/g' {} \;
          find third_party/externals -name '*.py' -path '*/scripts/*' -exec sed -i 's/print "\(.*\)"/print("\1")/g' {} \;
          # Fix Python 3 bytes/str issues in ICU script
          # hexlify returns bytes in Python 3, need .decode('ascii') before string ops
          python3 -c "
          import pathlib
          p = pathlib.Path('third_party/externals/icu/scripts/make_data_assembly.py')
          t = p.read_text()
          t = t.replace('.hexlify(input_data[i:i + 4][::step]).upper()', '.hexlify(input_data[i:i + 4][::step]).decode(\"ascii\").upper()')
          p.write_text(t)
          "

          bin/gn gen out/Release --args='is_official_build=true is_debug=false skia_use_vulkan=false skia_use_gl=true skia_use_system_expat=false skia_use_system_icu=false skia_use_system_libjpeg_turbo=false skia_use_system_libpng=false skia_use_system_libwebp=false skia_use_system_zlib=false extra_cflags_cc=["-fno-rtti"]'
          ninja -C out/Release skia
          ls -la out/Release/libskia.a
          cd ..

      - name: Configure CMake
        run: |
          cmake -S . -B build/cmake \
            -DENVE_USE_SYSTEM_LIBMYPAINT=ON \
            -DENVE_USE_WEBENGINE=OFF \
            -DENVE_USE_QSCINTILLA=OFF \
            -DENVE_USE_GPERFTOOLS=OFF \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build envecore
        run: |
          cmake --build build/cmake --target envecore -j"$(nproc)"

      - name: Build enve app
        run: |
          cmake --build build/cmake --target enve -j"$(nproc)"

      - name: Upload enve binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: enve-cmake-app
          if-no-files-found: error
          path: build/cmake/bin/enve

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cmake-app-build-logs
          if-no-files-found: warn
          path: |
            build/cmake/CMakeFiles/CMakeOutput.log
            build/cmake/CMakeFiles/CMakeError.log
